<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contato | AgroNexus</title>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/js/bootstrap.bundle.min.js"></script>
    <script src="./js/script.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div class="bg-glow"></div>

    <header class="header-modern">
        <div class="container d-flex justify-content-between align-items-center">
            <img src="./img/logo-agronexus.png.png" alt="Logo" style="height: 40px;">
            <nav>
                <a href="index.html" class="nav-link-custom">Início</a>
                <a href="login.html" class="nav-link-custom">Entrar</a>
                <a href="contato.html" class="nav-link-custom active">Fale Conosco</a>
                <a href="login.html" class="btn-primary-agro ms-4 text-decoration-none">Começar Agora</a>
            </nav>
        </div>
    </header>

    <main class="py-5">
        <div class="container py-5">
            <div class="row justify-content-center">
                <div class="col-lg-6">
                    <div class="text-center mb-5">
                        <span class="badge-agro mb-3">Suporte ao Produtor</span>
                        <h2 class="section-title mb-3">Fale Conosco</h2>
                        <p class="text-muted-custom">Dúvidas, sugestões ou suporte técnico? Nossa equipe está pronta para ajudar você.</p>
                    </div>

                    <div class="card-glass">
                        <form id="formContato">
                            <div class="mb-4">
                                <label class="form-label small text-muted-custom">Nome Completo</label>
                                <input type="text" id="nome" class="form-control input-modern" placeholder="Ex: João Silva">
                                <div class="invalid-feedback"></div>
                            </div>
                            
                            <div class="mb-4">
                                <label class="form-label small text-muted-custom">E-mail</label>
                                <input type="text" id="email" class="form-control input-modern" placeholder="seu@email.com">
                                <div class="invalid-feedback"></div>
                            </div>
                            
                            <div class="mb-4">
                                <label class="form-label d-flex justify-content-between">
                                    <span class="small text-muted-custom">Mensagem</span>
                                    <span id="charCount" class="small text-muted-custom">0 / 500</span>
                                </label>
                                <textarea id="mensagem" class="form-control input-modern" rows="5" placeholder="Como podemos ajudar?"></textarea>
                                <div class="invalid-feedback"></div>
                            </div>
                            
                            <button type="submit" class="btn-primary-agro w-100 py-3">Enviar Mensagem</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="py-5 border-top border-secondary mt-5">
        <div class="container text-center">
            <img src="./img/logo-agronexus.png.png" alt="Logo" style="height: 30px;" class="mb-4 opacity-50">
            <p class="text-muted-custom small">© 2026 AgroNexus - Tecnologia para quem alimenta o mundo.</p>
        </div>
    </footer>
</body>
</html>
