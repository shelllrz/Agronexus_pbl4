<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acesso | AgroNexus</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="bg-glow"></div>

    <div class="container d-flex justify-content-center align-items-center" style="min-height: 100vh;">
        <div class="col-lg-4">
            <div class="text-center mb-5">
                <img src="./img/logo-agronexus.png.png" alt="Logo" style="height: 50px;" class="mb-4">
                <h2 class="fw-bold">Acesse sua Conta</h2>
                <p class="text-muted-custom">Bem-vindo de volta à plataforma.</p>
            </div>

            <div class="card-glass">
                <form action="dashboard.html">
                    <div class="mb-4">
                        <label class="form-label small text-muted-custom">E-mail</label>
                        <input type="email" class="form-control input-modern" placeholder="seu@email.com" required>
                    </div>
                    <div class="mb-4">
                        <label class="form-label small text-muted-custom">Senha</label>
                        <input type="password" class="form-control input-modern" placeholder="••••••••" required>
                    </div>
                    <button type="submit" class="btn-primary-agro w-100 py-3">Entrar na Plataforma</button>
                    <div class="mt-4 text-center">
                        <a href="index.html" class="text-muted-custom small text-decoration-none">Voltar para o início</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
